messages:
  # ═══════════════════════════════════════════════
  # Prefix & Format
  # ═══════════════════════════════════════════════
  prefix: "&d&lPartnership &8» &r"
  
  # ═══════════════════════════════════════════════
  # Partnership Request Messages
  # ═══════════════════════════════════════════════
  request-sent: "&aPartnership request sent to &e{player}&a!"
  request-received: "&e{player} &7wants to be your partner!\\n&8   └ &7Type &f/partner accept {player} &7to accept"
  partnership-formed: "&a&lACCEPTED! &7You are now partners with &e{player}&7!"
  partnership-broken: "&c&lBROKEN! &7Partnership with &e{player} &7has ended."
  
  # ═══════════════════════════════════════════════
  # Error Messages
  # ═══════════════════════════════════════════════
  no-partner: "&cYou don't have a partner."
  already-partnered: "&cYou already have a partner!"
  target-has-partner: "&e{player} &calready has a partner!"
  no-pending-request: "&cNo pending request from &e{player}&c."
  request-expired: "&cPartnership request has expired."
  player-not-found: "&cPlayer &e{player} &cnot found."
  player-not-online: "&e{player} &cmust be online!"
  too-far: "&cYou are too far from &e{player}&c!"
  cooldown: "&cWait &e{seconds} seconds &cmore."
  cannot-partner-self: "&cYou can't partner with yourself!"
  
  # ═══════════════════════════════════════════════
  # Info Messages
  # ═══════════════════════════════════════════════
  config-reloaded: "&aConfig reloaded successfully!"
  partnership-info: "&6&lPARTNERSHIP INFO\\n&8┌─────────────────────────\\n&8│ &7Partner: &e{player}\\n&8│ &7Duration: &a{duration}\\n&8│ &7Since: &b{start_date}\\n&8└─────────────────────────"
  no-partnerships: "&cNo active partnerships on the server."
  
  # ═══════════════════════════════════════════════
  # Quest Messages
  # ═══════════════════════════════════════════════
  quest-complete: "&a&lQUEST COMPLETE! &7+&a{xp} XP"
  new-quest: "&e&lNEW QUEST!\\n&8   └ &7{description}"
  level-up: "&b&lLEVEL UP! &7Now &bLevel {level}"
  quest-expired: "&cQuest expired! A new quest is being generated..."
  
  # ═══════════════════════════════════════════════
  # Quest Progress (for listeners)
  # ═══════════════════════════════════════════════
  quest-progress: "&8[&a+{amount}&8] &7{current}&8/&7{required}"

# ═══════════════════════════════════════════════════════
# GIFT SYSTEM
# ═══════════════════════════════════════════════════════
gift:
  max-pending: 5

# ═══════════════════════════════════════════════════════
# PARTNER EFFECTS (Particle)
# ═══════════════════════════════════════════════════════
partner-effects:
  enabled: false
  interval-ticks: 60          # 60 ticks = 3 seconds
  max-distance: 10.0          # Max radius for particles

# ═══════════════════════════════════════════════════════
# PARTNER TITLES (PlaceholderAPI)
# ═══════════════════════════════════════════════════════
partner-titles:
  enabled: false
  format: "&d[{title}] "
  titles:
    1: "Partner"
    5: "Close"
    10: "Bonded"
    15: "Bestie"
    20: "Soulmate"
    25: "Eternal"

# ═══════════════════════════════════════════════════════
# PARTNER HOME
# ═══════════════════════════════════════════════════════
partner-home:
  enabled: true
  min-level: 3                # Minimum level to set home
  warmup-seconds: 3           # Stand still before teleport
  cooldown-seconds: 60        # Cooldown between teleports

# ═══════════════════════════════════════════════════════
# DAILY LOGIN STREAK
# ═══════════════════════════════════════════════════════
login-streak:
  enabled: true
  base-bonus-xp: 25           # XP bonus per streak level
  max-streak: 7               # Max streak (7 days = 175 XP)
  messages:
    streak-continue: "&a&lStreak! &7Day &e{streak}&7! Bonus &b+{xp} XP"
    streak-reset: "&cStreak reset! &7Login together with your partner to start a new streak."
    waiting-partner: "&7Waiting for your partner to login today to continue the streak..."