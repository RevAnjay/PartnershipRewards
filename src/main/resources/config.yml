database:
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: minecraft
    username: root
    password: password
  sqlite:
    file: partnerships.db
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000

partnership:
  cooldown-seconds: 60
  max-distance: 10
  require-both-online: true
  allow-self-partner: false

# Duration-based rewards (legacy system - still works)
rewards:
  enabled: true
  milestones:
    1:
      days: 1
      commands:
        - "give {player} diamond 5"
        - "give {partner} diamond 5"
      broadcast: "&e{player} &7dan &e{partner} &7telah menjadi partner selama &61 hari&7!"
    2:
      days: 7
      commands:
        - "give {player} diamond 16"
        - "give {partner} diamond 16"
      broadcast: "&e{player} &7dan &e{partner} &7telah menjadi partner selama &61 minggu&7!"
    3:
      days: 30
      commands:
        - "give {player} diamond 64"
        - "give {partner} diamond 64"
      broadcast: "&e{player} &7dan &e{partner} &7telah menjadi partner selama &61 bulan&7!"
    4:
      days: 90
      commands:
        - "give {player} netherite_ingot 10"
        - "give {partner} netherite_ingot 10"
      broadcast: "&e{player} &7dan &e{partner} &7telah menjadi partner selama &63 bulan&7!"

# ============================================
# Quest System Configuration
# ============================================
quest:
  xp-per-quest: 100           # XP reward per completed quest (default)
  base-xp-for-level: 200      # Base XP needed to reach level 2
  xp-multiplier-per-level: 1.2  # XP requirement increases 20% each level
  max-level: 50               # Maximum partnership level
  reset-hours: 24             # Quest will reset after X hours if not completed
  cooldown-minutes: 60        # Minutes to wait before getting new quest after completion (60 = 1 hour)
  
  # Custom XP requirement per level (overrides formula if set)
  # Remove or comment out levels you want to use formula instead
  xp-per-level:
    2: 200
    3: 250
    4: 300
    5: 400
    10: 800
    15: 1200
    20: 1800
    25: 2500
  
  # Quest type definitions - format: "TARGET:AMOUNT" or just amount
  types:
    # 🟢 Light Performance Quests (very low server impact)
    GIVE_ITEM:
      enabled: true
      items:
        - "DIAMOND:5"
        - "IRON_INGOT:32"
        - "GOLD_INGOT:16"
        - "EMERALD:8"
        - "COOKED_BEEF:64"
        - "APPLE:32"
    
    SEND_MESSAGE:
      enabled: true
      amount: [50, 100, 150]
    
    USE_COMMAND:
      enabled: true
      commands:
        - "/spawn:5"
        - "/home:10"
        - "/tpa:5"
    
    EAT_FOOD:
      enabled: true
      amount: [20, 30, 50]
    
    SLEEP_TOGETHER:
      enabled: true
      times: [1, 3, 5]
    
    FISH_CATCH:
      enabled: true
      amount: [10, 20, 30]
    
    TRADE_VILLAGER:
      enabled: true
      trades: [5, 10, 15]
    
    ENCHANT_ITEM:
      enabled: true
      amount: [3, 5, 10]
    
    ANVIL_USE:
      enabled: true
      amount: [3, 5, 10]
    
    BREW_POTION:
      enabled: false  # Disabled - requires special tracking
      amount: [5, 10, 15]
    
    # 🆕 FUN LIGHT QUESTS - Interesting activities
    THROW_SNOWBALL_AT_PARTNER:
      enabled: true
      amount: [10, 20, 30]       # Lempar snowball ke partner!
    
    THROW_EGG:
      enabled: true
      amount: [10, 15, 25]       # Lempar telur
    
    EAT_CAKE:
      enabled: true
      amount: [3, 5, 10]         # Makan kue bersama
    
    DRINK_MILK:
      enabled: true
      amount: [5, 10, 15]        # Minum susu
    
    LAUNCH_FIREWORK:
      enabled: true
      amount: [10, 20, 30]       # Luncurkan kembang api
    
    # 🟡 Medium Performance Quests (moderate server impact)
    KILL_MOBS:
      enabled: true
      max-distance: 30
      mobs:
        - "ZOMBIE:20"
        - "SKELETON:15"
        - "SPIDER:15"
        - "CREEPER:10"
        - "ENDERMAN:5"
        - "WITCH:8"
    
    CRAFT_ITEM:
      enabled: true
      items:
        - "DIAMOND_PICKAXE:1"
        - "IRON_SWORD:3"
        - "BOW:2"
        - "CAKE:1"
        - "ENDER_CHEST:1"
        - "SHIELD:2"
    
    PLACE_BLOCKS:
      enabled: true
      amount: [100, 200, 300]
    
    HARVEST_CROPS:
      enabled: true
      crops:
        - "WHEAT:64"
        - "CARROTS:64"
        - "POTATOES:64"
        - "BEETROOTS:32"
    
    TAME_ANIMAL:
      enabled: true
      amount: [2, 3, 5]
    
    BREED_ANIMAL:
      enabled: true
      amount: [5, 10, 15]
    
    SMELT_ITEMS:
      enabled: true
      amount: [32, 64, 128]
    
    # 🆕 NEW QUESTS - Additional variety
    SHOOT_ARROWS:
      enabled: true
      amount: [30, 50, 100]
    
    SHEAR_SHEEP:
      enabled: true
      amount: [10, 20, 30]
    
    USE_ENDER_PEARL:
      enabled: true
      amount: [5, 10, 15]
    
    KILL_WITH_BOW:
      enabled: true
      amount: [10, 20, 30]
    
    DAMAGE_EACH_OTHER:
      enabled: true
      amount: [10, 20, 30]        # Fun sparring quest
    
    VISIT_NETHER:
      enabled: true
      amount: [1]                  # Just visit once together
    
    RIDE_TOGETHER:
      enabled: true
      amount: [5, 10, 15]
    
    # 🔴 Heavy Performance Quests (optimized with caching)
    BREAK_BLOCKS:
      enabled: true               # Protected: only natural blocks count
      max-distance: 50            # Increased from 30 for easier progress
      amount: [200, 400, 600]
    
    PLAY_TOGETHER:
      enabled: true
      minutes: [30, 60, 120]
    
    # 🏆 BONUS QUESTS - Hard quests with higher XP reward (lower chance to appear)
    KILL_BOSS:
      enabled: true
      xp-reward: 500          # Custom XP reward (overrides default 100)
      chance: 10              # 10% chance to be selected
      bosses:
        - "ENDER_DRAGON:1"
        - "WITHER:1"
        - "ELDER_GUARDIAN:3"
    
    MINE_ANCIENT_DEBRIS:
      enabled: true
      xp-reward: 300
      chance: 15
      amount: [8, 12, 16]
    
    COMPLETE_RAID:
      enabled: true
      xp-reward: 400
      chance: 10
      amount: [1, 2]
    
    # 💪 CHALLENGING QUESTS - Takes longer to complete, higher rewards
    EARN_XP_LEVELS:
      enabled: true
      xp-reward: 250
      chance: 30              # 30% chance
      amount: [5, 10, 15]     # Naik 5-15 level XP
    
    MINE_DIAMOND_ORE:
      enabled: true
      xp-reward: 200
      chance: 25
      amount: [10, 15, 20]    # Tambang 10-20 diamond ore
    
    MINE_DEEPSLATE_ORES:
      enabled: true
      xp-reward: 200
      chance: 35
      amount: [20, 30, 50]    # Tambang 20-50 deepslate ore
    
    KILL_WITHER_SKELETONS:
      enabled: true
      xp-reward: 300
      chance: 20
      amount: [15, 25, 35]    # Bunuh 15-35 wither skeleton
    
    SMELT_NETHERITE:
      enabled: true
      xp-reward: 400
      chance: 10              # Very rare
      amount: [4, 6, 8]       # Smelt 4-8 netherite scrap (from ancient debris)

